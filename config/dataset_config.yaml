# Dataset Configuration for Community Detection Benchmarks
# Each dataset entry contains the parameters required for benchmarking

target_datasets:
  - email-enron-large
  - synthetic-n-5000-1

common: &common_settings
  max_steps: 9
  initial_fraction: 0.4
  batch_range: 0.0001

datasets:
  email-enron-large:
    <<: *common_settings
    dataset_name: "email-Enron-large"
    delimiter: " "
    path: "./data/email-enron-large.txt"
    source_idx: 0
    target_idx: 1
    type: "edge_list"

  bio-wormnet-v3:
    <<: *common_settings
    dataset_name: "bio-WormNet-v3"
