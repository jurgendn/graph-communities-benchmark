workspace: "d-ng-nguy-n"

directories:
  raw_dir: "experiments/static/raw"
  merge_dir: "experiments/static/merged"
  output_dir: "assets/static"

hyperparameters:
  - preload_fraction
  - preload-fraction

metric_keys:
  - "cdlib_modularity"
  - "customize_q0_modularity"
  - "num_communities"
  - "runtime"

use_batch_ranges: false

projects:
  - graph-community-detection-static-karate
  - graph-community-detection-static-email-enron-large
  - graph-community-detection-static-ca-astroph
  - graph-community-detection-static-ca-condmat
  - graph-community-detection-static-ca-hepph
  - graph-community-detection-static-scc-infect-dublin
  - graph-community-detection-static-scc-infect-hyper
  - graph-community-detection-static-scc-retweet
  - graph-community-detection-static-scc-twitter-copen
  - graph-community-detection-static-soc-blogcatalog-asu
  - graph-community-detection-static-bio-wormnet-v3
  - graph-community-detection-static-lfr-large-community-size
  - graph-community-detection-static-lfr-small-community-size

plotter:
  common_plotter_settings:
    synthetic_datasets: &static_synthetic_datasets
      - graph-community-detection-static-lfr-large-community-size
      - graph-community-detection-static-lfr-small-community-size
    real_world_datasets: &static_real_world_datasets
      - graph-community-detection-static-karate
      - graph-community-detection-static-email-enron-large
      - graph-community-detection-static-ca-astroph
      - graph-community-detection-static-ca-condmat
      - graph-community-detection-static-ca-hepph
      - graph-community-detection-static-scc-infect-dublin
      - graph-community-detection-static-scc-infect-hyper
      - graph-community-detection-static-scc-retweet
      - graph-community-detection-static-scc-twitter-copen
      - graph-community-detection-static-soc-blogcatalog-asu
      - graph-community-detection-static-bio-wormnet-v3
    projects_name_mapping:
      graph-community-detection-static-karate: "Karate"
      graph-community-detection-static-email-enron-large: "Email-Enron-Large"
      graph-community-detection-static-ca-astroph: "CA-AstroPh"
      graph-community-detection-static-ca-condmat: "CA-CondMat"
      graph-community-detection-static-ca-hepph: "CA-Hepph"
      graph-community-detection-static-scc-infect-dublin: "SCC-Infect-Dublin"
      graph-community-detection-static-scc-infect-hyper: "SCC-Infect-Hyper"
      graph-community-detection-static-scc-retweet: "SCC-Retweet"
      graph-community-detection-static-scc-twitter-copen: "SCC-Twitter-Copen"
      graph-community-detection-static-soc-blogcatalog-asu: "Soc-BlogCatalog-ASU"
      graph-community-detection-static-bio-wormnet-v3: "Bio-WormNet-v3"
      graph-community-detection-static-lfr-large-community-size: "LFR-Large-Community-Size"
      graph-community-detection-static-lfr-small-community-size: "LFR-Small-Community-Size"
    selected_algorithms:
      - coach
      - tiles
      - core_expansion
      - graph_entropy
      - overlapping_rwgp_df
    methods_name:
      coach: CoAcH
      core_expansion: Core Expansion
      graph_entropy: Graph Entropy
      umstmo: UMSTMO
      overlapping_rwgp_df: RWGP-DFL-Overlap
      tiles: Tiles
      slpa: SLPA
    colors:
      coach: "#1B4F72"
      core_expansion: "#E09F3E"
      graph_entropy: "#2E8B57"
      slpa: "#8E44AD"
      umstmo: "#C0392B"
      overlapping_rwgp_df: "#E74C3C"
      tiles: "#17A2B8"
    orders:
      - overlapping_rwgp_df
      - coach
      - core_expansion
      - graph_entropy
      - tiles
      - slpa
    markers:
      coach: "o"
      core_expansion: "s"
      graph_entropy: "D"
      umstmo: "^"
      overlapping_rwgp_df: "v"
      slpa: "P"
      tiles: "X"
  grouped_plotter:
    synthetic_datasets: *static_synthetic_datasets
    real_world_datasets: *static_real_world_datasets
    group_by:
      - real_world_datasets
      - synthetic_datasets
    subplots_layout:
      real_world_datasets: [3, 4]
      synthetic_datasets: [1, 2]
