# Algorithm Configuration for Community Detection
# Contains all available community detection algorithms (crisp and overlapping)

# Specify which algorithms to run (in order)
target_algorithms:
  - coach
  # - percomvc
  # - big_clam
  # - slpa
  - core_expansion
  - graph_entropy
  - df_louvain

# All available algorithms with their configurations
# module: Full import path (e.g., "cdlib.algorithms" or "cdlib.algorithms.overlapping_partition")
# function: Function name to import from the module
# type: "static" (runs independently per snapshot) or "dynamic" (uses full temporal graph)
# clustering_type: "overlapping" or "crisp" — determines which modularity metric to use
algorithms:
  big_clam:
    module: "src.models.static_methods.overlap.big_clam"
    function: "BigClam"
    params:
      num_communities: 10
      iterations: 100
      learning_rate: 0.005
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "BigClam: Overlapping community detection algorithm"

  angel:
    module: "cdlib.algorithms"
    function: "angel"
    params:
      threshold: 0.25
    type: "static"
    clustering_type: "crisp"
    metadata: {}
    description: "ANGEL: A New Graph-based Entity Linking algorithm"

  demon:
    module: "cdlib.algorithms"
    function: "demon"
    params:
      epsilon: 0.25
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "DEMON: a local-first discovery method for overlapping communities"

  umstmo:
    module: "cdlib.algorithms"
    function: "umstmo"
    params: {}
    type: "static"
    clustering_type: "crisp"
    metadata: {}
    description: "Universal Multi-Scale Community Detection"

  slpa:
    module: "cdlib.algorithms"
    function: "slpa"
    params: {}
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "Speaker-Listener Label Propagation Algorithm"

  core_expansion:
    module: "cdlib.algorithms"
    function: "core_expansion"
    params: {}
    type: "static"
    clustering_type: "crisp"
    metadata: {}
    description: "Core Expansion algorithm for overlapping community detection"

  graph_entropy:
    module: "cdlib.algorithms"
    function: "graph_entropy"
    params: {}
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "Graph Entropy based community detection"

  coach:
    module: "cdlib.algorithms"
    function: "coach"
    params: {}
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "COACH: Clustering of Overlapping Communities using Hub structures"

  percomvc:
    module: "cdlib.algorithms"
    function: "percomvc"
    params: {}
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "Permanence based Overlapping Community Detection"

  dpclus:
    module: "cdlib.algorithms"
    function: "dpclus"
    params: {}
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "Density-Periphery based Clustering"

  ipca:
    module: "cdlib.algorithms"
    function: "ipca"
    params: {}
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "Iterative Principal Component Analysis"

  lais2:
    module: "cdlib.algorithms.overlapping_partition"
    function: "lais2"
    params: {}
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "Label Propagation with Improved Seed Selection"

  walkscan:
    module: "cdlib.algorithms.overlapping_partition"
    function: "walkscan"
    params: {}
    type: "static"
    clustering_type: "crisp"
    metadata: {}
    description: "Walk-based SCAN algorithm for overlapping communities"

  dcs:
    module: "cdlib.algorithms"
    function: "dcs"
    params: {}
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "Distributed Community Search"

  lfm:
    module: "cdlib.algorithms"
    function: "lfm"
    params:
      alpha: 1.0
    type: "static"
    clustering_type: "overlapping"
    metadata: {}
    description: "Lancichinetti-Fortunato-Radicchi benchmark for overlapping communities"

  ebgc:
    module: "cdlib.algorithms"
    function: "ebgc"
    params: {}
    type: "static"
    clustering_type: "crisp"
    metadata: {}
    description: "Entropy-based Graph Clustering"

  # Note: ndocd requires custom implementation class NDOCD()
  # ndocd:
  #   module: "src.models.static_methods.overlap.ndocd"
  #   function: "NDOCD"
  #   params: {}
  #   type: "static"
  #   clustering_type: "overlapping"
  #   metadata: {}
  #   description: "Nonnegative Matrix Factorization for Overlapping Community Detection"

  # Dynamic Frontier Louvain - Crisp (non-overlapping) community detection
  df_louvain:
    module: "src.models.dynamic_methods.crisp.df_louvain"
    function: "run_df_louvain"
    params: {}
    type: "dynamic"
    clustering_type: "crisp"
    metadata: {}
    description: "Dynamic Frontier Louvain for crisp community detection in temporal graphs"

  # TILES - Temporal Incremental Link-based Evolutionary System (overlapping)
  tiles:
    module: "src.models.dynamic_methods.overlap.tiles"
    function: "Tiles"
    params:
      obs: 1
    type: "dynamic"
    clustering_type: "overlapping"
    metadata: {}
    description: "TILES: Temporal Incremental Link-based Evolutionary System"
