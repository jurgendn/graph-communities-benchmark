# Algorithm Run Configuration
#
# This file selects which registered algorithms to run and optionally
# overrides their default parameters.
#
# Algorithm identity (module, type, clustering_type, description) is
# defined by @register decorators in the algorithm source files.
# This YAML only controls execution.
#
# Available registered algorithms can be listed with:
#   python -c "from src.algorithms.factory import _ensure_registrations; _ensure_registrations(); from src.algorithms.registry import ALGORITHM_REGISTRY; print(sorted(ALGORITHM_REGISTRY.keys()))"

# ── Which algorithms to run ──────────────────────────────────────────

# Snapshot (static) algorithms run independently on each snapshot.
target_snapshot_algorithms:
  # - vast-pmo
  # - coach
  # - copra
  # - big_clam
  # - core_expansion
  # - graph_entropy
  # - percomvc
  # - slpa

# Temporal (dynamic) algorithms consume the full temporal graph.
target_temporal_algorithms:
  - tiles
  # - df_louvain

# ── Parameter overrides (optional) ───────────────────────────────────
# Override default_params from @register for specific runs.
# Only list parameters you want to change.

algorithm_params:
  big_clam:
    num_communities: 10
    iterations: 100
    learning_rate: 0.005

  copra:
    iterations: 10
    max_communities: 5

  vast-cosine-overlap:
    theta: 0.85
    walk_power: 3

  vast-pmo:
    louvain_resolution: 1
    theta: 0.85

  tiles:
    obs: 1

  angel:
    threshold: 0.25

  demon:
    epsilon: 0.25

  lfm:
    alpha: 1.0
