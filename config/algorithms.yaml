# Algorithm Configuration for Community Detection

# Snapshot algorithms run independently on each snapshot.
target_snapshot_algorithms:
  - coach
  # - percomvc
  # - big_clam
  # - slpa
  - core_expansion
  - graph_entropy

# Temporal algorithms consume the full temporal graph.
target_temporal_algorithms:
  - tiles
  # - df_louvain

snapshot_algorithms:
  big_clam:
    module: "src.models.static.overlap.big_clam"
    function: "BigClam"
    params:
      num_communities: 10
      iterations: 100
      learning_rate: 0.005
    clustering_type: "overlapping"
    metadata: {}
    description: "BigClam: Overlapping community detection algorithm"

  angel:
    module: "cdlib.algorithms"
    function: "angel"
    params:
      threshold: 0.25
    clustering_type: "crisp"
    metadata: {}
    description: "ANGEL: A New Graph-based Entity Linking algorithm"

  demon:
    module: "cdlib.algorithms"
    function: "demon"
    params:
      epsilon: 0.25
    clustering_type: "overlapping"
    metadata: {}
    description: "DEMON: a local-first discovery method for overlapping communities"

  umstmo:
    module: "cdlib.algorithms"
    function: "umstmo"
    params: {}
    clustering_type: "crisp"
    metadata: {}
    description: "Universal Multi-Scale Community Detection"

  slpa:
    module: "cdlib.algorithms"
    function: "slpa"
    params: {}
    clustering_type: "overlapping"
    metadata: {}
    description: "Speaker-Listener Label Propagation Algorithm"

  core_expansion:
    module: "cdlib.algorithms"
    function: "core_expansion"
    params: {}
    clustering_type: "crisp"
    metadata: {}
    description: "Core Expansion algorithm for overlapping community detection"

  graph_entropy:
    module: "cdlib.algorithms"
    function: "graph_entropy"
    params: {}
    clustering_type: "overlapping"
    metadata: {}
    description: "Graph Entropy based community detection"

  coach:
    module: "cdlib.algorithms"
    function: "coach"
    params: {}
    clustering_type: "overlapping"
    metadata: {}
    description: "COACH: Clustering of Overlapping Communities using Hub structures"

  percomvc:
    module: "cdlib.algorithms"
    function: "percomvc"
    params: {}
    clustering_type: "overlapping"
    metadata: {}
    description: "Permanence based Overlapping Community Detection"

  dpclus:
    module: "cdlib.algorithms"
    function: "dpclus"
    params: {}
    clustering_type: "overlapping"
    metadata: {}
    description: "Density-Periphery based Clustering"

  ipca:
    module: "cdlib.algorithms"
    function: "ipca"
    params: {}
    clustering_type: "overlapping"
    metadata: {}
    description: "Iterative Principal Component Analysis"

  lais2:
    module: "cdlib.algorithms.overlapping_partition"
    function: "lais2"
    params: {}
    clustering_type: "overlapping"
    metadata: {}
    description: "Label Propagation with Improved Seed Selection"

  walkscan:
    module: "cdlib.algorithms.overlapping_partition"
    function: "walkscan"
    params: {}
    clustering_type: "crisp"
    metadata: {}
    description: "Walk-based SCAN algorithm for overlapping communities"

  dcs:
    module: "cdlib.algorithms"
    function: "dcs"
    params: {}
    clustering_type: "overlapping"
    metadata: {}
    description: "Distributed Community Search"

  lfm:
    module: "cdlib.algorithms"
    function: "lfm"
    params:
      alpha: 1.0
    clustering_type: "overlapping"
    metadata: {}
    description: "Lancichinetti-Fortunato-Radicchi benchmark for overlapping communities"

  ebgc:
    module: "cdlib.algorithms"
    function: "ebgc"
    params: {}
    clustering_type: "crisp"
    metadata: {}
    description: "Entropy-based Graph Clustering"

  vast-cosine-overlap:
    module: "src.models.static.overlap.vast_cosine_overlap"
    function: "VASTCosineOverlap"
    params: {}
    clustering_type: "overlapping"
    metadata: {}
    description: "VAST Cosine Overlap for overlapping community detection"

temporal_algorithms:
  df_louvain:
    module: "src.models.dynamic.crisp.df_louvain"
    function: "run_df_louvain"
    params: {}
    clustering_type: "crisp"
    metadata: {}
    description: "Dynamic Frontier Louvain for crisp community detection in temporal graphs"

  tiles:
    module: "src.models.dynamic.overlap.tiles"
    function: "Tiles"
    params:
      obs: 1
    clustering_type: "overlapping"
    metadata: {}
    description: "TILES: Temporal Incremental Link-based Evolutionary System"
